name: Windows-RDP-VPS

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Download Cloudflared
      run: |
        curl -L --output cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe

    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

    - name: Set Password for runneradmin
      run: |
        $Password = ConvertTo-SecureString "MyPassword123" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password

    - name: Start Cloudflare Tunnel
      run: |
        # මේකෙන් Tunnel එක background එකේ run කරනවා URL එක පෙන්නන ගමන්
        Start-Process powershell -ArgumentList "-NoExit -Command ./cloudflared.exe tunnel --url tcp://localhost:3389"
        Write-Host "Waiting for tunnel to initialize..."
        Start-Sleep -Seconds 10

    - name: Keep Alive & Show URL
      run: |
        Write-Host "Look for the '.trycloudflare.com' URL in the logs above or below."
        # පැය 6ක් යනකම් VPS එක දුවන්න මේ loop එක උදව් වෙනවා
        $i = 1
        while($i -lt 360) {
          Write-Host "VPS is still running... Minute: $i"
          Start-Sleep -Seconds 60
          $i++
        }
